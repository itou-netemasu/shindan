<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ゆるっとアニマル診断</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: linear-gradient(160deg, #fff9c4 0%, #fce4ec 50%, #e3f2fd 100%);
      min-height: 100vh;
      font-family: 'Zen Maru Gothic', 'Hiragino Maru Gothic Pro', sans-serif;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      overflow-x: hidden;
    }

    /* 背景動物 */
    .bg-animals {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .bg-animals span {
      position: absolute;
      font-size: 2.8rem;
      opacity: 0.12;
      animation: floatAnim 7s ease-in-out infinite;
    }
    @keyframes floatAnim {
      0%,100% { transform: translateY(0) rotate(-5deg); }
      50%      { transform: translateY(-22px) rotate(5deg); }
    }

    /* 画面共通 */
    .screen { display: none; }
    .screen.active {
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 32px 0 48px;
      min-height: 100vh;
      width: 100%;
    }

    .card {
      position: relative;
      z-index: 1;
      background: rgba(255,255,255,0.9);
      backdrop-filter: blur(12px);
      border-radius: 36px;
      padding: 52px 44px 44px;
      text-align: center;
      max-width: 480px;
      width: 92%;
      box-shadow: 0 12px 40px rgba(0,0,0,0.10);
    }

    /* ── TOP ── */
    .paw {
      font-size: 3.6rem;
      display: block;
      margin-bottom: 12px;
      animation: bounce 2.4s ease-in-out infinite;
    }
    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50%      { transform: translateY(-10px); }
    }
    h1 {
      font-size: 2.2rem;
      font-weight: 900;
      color: #4e342e;
      line-height: 1.35;
      margin-bottom: 14px;
    }
    .sub {
      font-size: 0.95rem;
      color: #795548;
      line-height: 1.9;
      margin-bottom: 28px;
    }
    .badges {
      display: flex;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }
    .badge {
      background: #fff3e0;
      border: 2px solid #ffcc80;
      border-radius: 20px;
      padding: 5px 16px;
      font-size: 0.82rem;
      font-weight: 700;
      color: #e65100;
    }
    .btn-start {
      background: linear-gradient(135deg, #ffb74d, #ff7043);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 18px 52px;
      font-size: 1.15rem;
      font-weight: 900;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 6px 20px rgba(255,112,67,0.38);
      transition: transform 0.18s, box-shadow 0.18s;
    }
    .btn-start:hover {
      transform: translateY(-4px) scale(1.05);
      box-shadow: 0 10px 28px rgba(255,112,67,0.48);
    }
    .parade {
      margin-top: 28px;
      font-size: 1.5rem;
      letter-spacing: 5px;
    }

    /* ── 質問画面 ── */
    #q-screen .card {
      padding: 36px 32px 44px;
    }

    .progress-wrap {
      margin-bottom: 28px;
    }
    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      font-weight: 700;
      color: #bcaaa4;
      margin-bottom: 8px;
    }
    .progress-bar-bg {
      background: #f3e5d0;
      border-radius: 8px;
      height: 10px;
      overflow: hidden;
    }
    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #ffb74d, #ff7043);
      border-radius: 8px;
      transition: width 0.4s ease;
    }

    .q-animal {
      font-size: 2.8rem;
      margin-bottom: 12px;
      display: block;
      animation: fadeIn 0.3s ease;
    }
    .q-text {
      font-size: 1.1rem;
      font-weight: 900;
      color: #4e342e;
      line-height: 1.7;
      margin-bottom: 28px;
      min-height: 56px;
      animation: fadeIn 0.3s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .q-choices {
      display: flex;
      flex-direction: column;
      gap: 14px;
      margin-bottom: 24px;
    }
    .btn-choice {
      background: #fff;
      border: 2.5px solid #f3e5d0;
      border-radius: 20px;
      padding: 18px 20px;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      color: #5d4037;
      text-align: left;
      transition: all 0.18s;
      line-height: 1.5;
      animation: fadeIn 0.3s ease;
    }
    .btn-choice:hover {
      background: #fff3e0;
      border-color: #ffb74d;
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(255,183,77,0.25);
    }
    .btn-choice .choice-icon {
      display: inline-block;
      width: 28px;
      height: 28px;
      background: #fff3e0;
      border-radius: 50%;
      text-align: center;
      line-height: 28px;
      font-size: 0.78rem;
      font-weight: 900;
      color: #e65100;
      margin-right: 10px;
      flex-shrink: 0;
    }
    .btn-choice-inner {
      display: flex;
      align-items: center;
    }

    .btn-back {
      background: none;
      border: none;
      font-family: inherit;
      font-size: 0.82rem;
      color: #bcaaa4;
      cursor: pointer;
      padding: 4px 8px;
      transition: color 0.15s;
    }
    .btn-back:hover { color: #795548; }

    /* ── 結果画面 ── */
    #result-screen .card { padding: 36px 32px 44px; }

    .result-label {
      display: inline-block;
      background: linear-gradient(135deg, #ce93d8, #f48fb1);
      color: #fff;
      border-radius: 20px;
      padding: 4px 20px;
      font-size: 0.82rem;
      font-weight: 700;
      margin-bottom: 20px;
      letter-spacing: 1px;
    }
    .result-animal {
      font-size: 5.5rem;
      display: block;
      margin-bottom: 8px;
      animation: popIn 0.6s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes popIn {
      from { transform: scale(0.3); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    .result-type  { font-size: 1.8rem; font-weight: 900; color: #4e342e; margin-bottom: 4px; }
    .result-catch { font-size: 1rem; color: #e65100; font-weight: 700; margin-bottom: 24px; }

    .info-block {
      background: #fff8e1;
      border-left: 4px solid #ffd54f;
      border-radius: 16px;
      padding: 16px 18px;
      margin-bottom: 14px;
      text-align: left;
    }
    .info-block.green { background: #f1f8e9; border-color: #aed581; }
    .info-block.blue  { background: #e3f2fd; border-color: #90caf9; }
    .info-block.pink  { background: #fce4ec; border-color: #f48fb1; }

    .block-title {
      font-size: 0.78rem;
      font-weight: 900;
      color: #9e9e9e;
      letter-spacing: 1px;
      margin-bottom: 10px;
    }
    .block-text {
      font-size: 0.9rem;
      color: #5d4037;
      line-height: 1.85;
    }
    .block-list {
      list-style: none;
      font-size: 0.9rem;
      color: #5d4037;
      line-height: 1.7;
    }
    .block-list li { margin-bottom: 4px; }
    .block-list li::before { content: '✦ '; color: #ffb300; }
    .block-list.green li::before { color: #7cb342; }
    .block-list.blue  li::before { color: #42a5f5; }

    .job-tags { display: flex; gap: 8px; flex-wrap: wrap; }
    .job-tag {
      background: #e8f5e9;
      border: 2px solid #a5d6a7;
      border-radius: 20px;
      padding: 4px 14px;
      font-size: 0.8rem;
      font-weight: 700;
      color: #2e7d32;
    }

    .partner-cards { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
    .partner-card {
      background: #fff3e0;
      border: 2px solid #ffcc80;
      border-radius: 20px;
      padding: 14px 20px;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      text-align: center;
      min-width: 100px;
    }
    .partner-card:hover { transform: translateY(-3px); box-shadow: 0 6px 16px rgba(0,0,0,0.1); }
    .partner-card .p-emoji { font-size: 2.2rem; display: block; margin-bottom: 4px; }
    .partner-card .p-name  { font-size: 0.78rem; font-weight: 700; color: #e65100; }
    .partner-card .p-star  { font-size: 0.7rem; }

    .divider { border: none; border-top: 2px dashed #f0e0d0; margin: 18px 0; }

    .btn-copy {
      background: linear-gradient(135deg, #ce93d8, #9c27b0);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 14px 36px;
      font-size: 1rem;
      font-weight: 900;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(156,39,176,0.3);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .btn-copy:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(156,39,176,0.38); }
    .btn-record {
      background: linear-gradient(135deg, #81c784, #388e3c);
      color: #fff;
      border: none;
      border-radius: 50px;
      padding: 14px 36px;
      font-size: 1rem;
      font-weight: 900;
      font-family: inherit;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(56,142,60,0.3);
      transition: transform 0.15s, box-shadow 0.15s;
      margin-top: 12px;
      display: block;
      width: 100%;
    }
    .btn-record:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(56,142,60,0.38); }
    .btn-retry {
      margin-top: 12px;
      background: none;
      border: 2px solid #e0e0e0;
      border-radius: 50px;
      padding: 10px 28px;
      font-size: 0.85rem;
      font-weight: 700;
      font-family: inherit;
      cursor: pointer;
      color: #9e9e9e;
      transition: background 0.15s;
      display: block;
      width: 100%;
    }
    .btn-retry:hover { background: #f5f5f5; }

    /* モーダル */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.35);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 28px;
      padding: 32px 28px;
      max-width: 320px;
      width: 88%;
      text-align: center;
      box-shadow: 0 16px 48px rgba(0,0,0,0.18);
      animation: popIn 0.35s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    .modal .m-pair  { font-size: 2.6rem; margin-bottom: 8px; }
    .modal .m-title { font-size: 1.05rem; font-weight: 900; color: #4e342e; margin-bottom: 12px; }
    .modal .m-desc  { font-size: 0.88rem; color: #5d4037; line-height: 1.85; margin-bottom: 20px; }
    .m-close {
      background: #eee;
      border: none;
      border-radius: 20px;
      padding: 8px 28px;
      font-family: inherit;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.9rem;
      color: #555;
    }

    .toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%) translateY(20px);
      background: #323232;
      color: #fff;
      border-radius: 24px;
      padding: 10px 28px;
      font-size: 0.88rem;
      font-weight: 700;
      opacity: 0;
      transition: opacity 0.3s, transform 0.3s;
      z-index: 200;
      pointer-events: none;
    }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <div class="bg-animals">
    <span style="top:8%;  left:4%;  animation-delay:0s">🦁</span>
    <span style="top:18%; right:6%; animation-delay:1s">🐘</span>
    <span style="top:55%; left:2%; animation-delay:2s">🦊</span>
    <span style="top:72%; right:4%; animation-delay:0.5s">🐢</span>
    <span style="top:38%; right:2%; animation-delay:1.5s">🦋</span>
    <span style="bottom:14%;left:7%;animation-delay:2.5s">🐬</span>
    <span style="top:4%;  right:18%;animation-delay:3s">🦅</span>
    <span style="bottom:8%;right:14%;animation-delay:3.5s">🐻</span>
    <span style="top:82%; left:22%;animation-delay:4s">🐇</span>
    <span style="top:12%; left:28%;animation-delay:4.5s">🦒</span>
  </div>

  <!-- TOP -->
  <div id="top-screen" class="screen active">
    <div class="card">
      <span class="paw">🐾</span>
      <h1>ゆるっと<br>アニマル診断</h1>
      <p class="sub">
        15の質問に答えるだけで<br>
        あなたにそっくりな動物タイプが分かる！<br>
        相性チェックもできるよ 🌟
      </p>
      <div class="badges">
        <span class="badge">📝 15問</span>
        <span class="badge">⏱ 約3分</span>
        <span class="badge">🐾 10タイプ</span>
      </div>
      <button class="btn-start" onclick="startQuiz()">
        診断スタート 🐾
      </button>
      <div class="parade">🦁🐘🦊🐢🦋🐬🦅🐻🐇🦒</div>
    </div>
  </div>

  <!-- 質問 -->
  <div id="q-screen" class="screen">
    <div class="card">
      <div class="progress-wrap">
        <div class="progress-label">
          <span id="q-num">1 / 15</span>
          <span>🐾</span>
        </div>
        <div class="progress-bar-bg">
          <div class="progress-bar-fill" id="progress-fill" style="width:0%"></div>
        </div>
      </div>
      <span class="q-animal" id="q-animal">🤔</span>
      <div class="q-text" id="q-text"></div>
      <div class="q-choices">
        <button class="btn-choice" id="btn-a" onclick="answer('a')">
          <div class="btn-choice-inner">
            <span class="choice-icon">A</span>
            <span id="choice-a-text"></span>
          </div>
        </button>
        <button class="btn-choice" id="btn-b" onclick="answer('b')">
          <div class="btn-choice-inner">
            <span class="choice-icon">B</span>
            <span id="choice-b-text"></span>
          </div>
        </button>
      </div>
      <button class="btn-back" id="btn-back" onclick="goBack()">← もどる</button>
    </div>
  </div>

  <!-- 結果 -->
  <div id="result-screen" class="screen">
    <div class="card">
      <span class="result-label">✨ 診断結果</span>
      <span class="result-animal" id="r-emoji"></span>
      <div class="result-type"  id="r-name"></div>
      <div class="result-catch" id="r-catch"></div>

      <div class="info-block">
        <div class="block-title">🐾 あなたはこんな人</div>
        <p class="block-text" id="r-desc"></p>
      </div>
      <div class="info-block green">
        <div class="block-title">💪 あなたの強み</div>
        <ul class="block-list green" id="r-strengths"></ul>
      </div>
      <div class="info-block blue">
        <div class="block-title">💡 もっとよくなるヒント</div>
        <ul class="block-list blue" id="r-cautions"></ul>
      </div>
      <div class="info-block pink">
        <div class="block-title">👥 グループでのあなた</div>
        <p class="block-text" id="r-group"></p>
      </div>

      <hr class="divider">

      <div style="margin-bottom:18px">
        <div class="block-title" style="margin-bottom:10px">💼 向いているお仕事（参考）</div>
        <div class="job-tags" id="r-jobs" style="justify-content:center"></div>
      </div>

      <hr class="divider">

      <div style="margin-bottom:28px">
        <div class="block-title" style="margin-bottom:6px">💛 ベストパートナー</div>
        <p style="font-size:0.78rem;color:#bbb;margin-bottom:14px">タップすると相性コメントが見られるよ</p>
        <div class="partner-cards" id="r-partners"></div>
      </div>

      <div>
        <div class="block-title" style="margin-bottom:12px">📣 結果をシェアしよう</div>
        <button class="btn-copy" onclick="copyResultURL()">🔗 結果URLをコピー</button>
        <button class="btn-record" onclick="recordResult()">📋 結果を記録する</button>
        <button class="btn-retry" onclick="showTop()">🔄 もう一度診断する</button>
      </div>
    </div>
  </div>

  <!-- モーダル -->
  <div class="modal-overlay" id="modal" onclick="closeModal(event)">
    <div class="modal">
      <div class="m-pair"  id="m-pair"></div>
      <div class="m-title" id="m-title"></div>
      <div class="m-desc"  id="m-desc"></div>
      <button class="m-close" onclick="closeModal()">とじる</button>
    </div>
  </div>

  <div class="toast" id="toast">結果URLをコピーしました！</div>

  // ── 状態管理 ──
  let currentQ = 0;
  let scores = {};
  let history = [];
  let currentTypeId = '';

  function resetScores() {
    scores = {};
    Object.keys(TYPES).forEach(k => scores[k] = 0);
  }

  // ── 質問描画 ──
  function renderQuestion() {
    const q = QUESTIONS[currentQ];
    document.getElementById('q-num').textContent = (currentQ + 1) + ' / ' + QUESTIONS.length;
    document.getElementById('progress-fill').style.width = (currentQ / QUESTIONS.length * 100) + '%';
    document.getElementById('q-animal').textContent = q.animal;
    document.getElementById('q-text').textContent   = q.q;
    document.getElementById('choice-a-text').textContent = q.a.text;
    document.getElementById('choice-b-text').textContent = q.b.text;
    document.getElementById('btn-back').style.visibility = currentQ === 0 ? 'hidden' : 'visible';

    // フェードアニメーション再実行
    ['q-animal','q-text','btn-a','btn-b'].forEach(id => {
      const el = document.getElementById(id);
      el.style.animation = 'none';
      requestAnimationFrame(() => { el.style.animation = ''; });
    });
  }

  // ── 回答 ──
  function answer(choice) {
    const q = QUESTIONS[currentQ];
    const s = choice === 'a' ? q.a.scores : q.b.scores;
    history.push({q: currentQ, choice, scores: {...scores}});
    Object.entries(s).forEach(([k,v]) => scores[k] = (scores[k] || 0) + v);
    currentQ++;
    if (currentQ >= QUESTIONS.length) {
      const winner = Object.entries(scores).sort((a,b) => b[1]-a[1])[0][0];
      showResult(winner);
    } else {
      renderQuestion();
    }
  }

  // ── もどる ──
  function goBack() {
    if (history.length === 0) return;
    const prev = history.pop();
    scores = prev.scores;
    currentQ = prev.q;
    renderQuestion();
  }

  // ── 診断スタート ──
  function startQuiz() {
    resetScores();
    currentQ = 0;
    history  = [];
    renderQuestion();
    document.getElementById('top-screen').classList.remove('active');
    document.getElementById('q-screen').classList.add('active');
    window.scrollTo(0, 0);
  }

  // ── 結果表示 ──
  function recordResult() {
    const t = TYPES[currentTypeId];
    if (!t) return;
    const base = 'https://docs.google.com/forms/d/e/1FAIpQLSevUTdNqlMaKAkRSU6Obv7K-jUrZk8COWdZXGNPeeKIkXsPOA/viewform';
    const url = `${base}?entry.455060695=${encodeURIComponent(t.name)}`;
    window.open(url, '_blank');
  }

  function showResult(typeId) {
    const t = TYPES[typeId];
    if (!t) return;
    currentTypeId = typeId;
    document.getElementById('r-emoji').textContent = t.emoji;
    document.getElementById('r-name').textContent  = t.name;
    document.getElementById('r-catch').textContent = t.catch;
    document.getElementById('r-desc').textContent  = t.desc;
    document.getElementById('r-group').textContent = t.group;
    document.getElementById('r-strengths').innerHTML = t.strengths.map(s=>`<li>${s}</li>`).join('');
    document.getElementById('r-cautions').innerHTML  = t.cautions.map(c=>`<li>${c}</li>`).join('');
    document.getElementById('r-jobs').innerHTML = t.jobs.map(j=>`<span class="job-tag">${j}</span>`).join('');

    const pc = document.getElementById('r-partners');
    pc.innerHTML = '';
    Object.entries(t.partners).forEach(([pid, desc]) => {
      const pt = TYPES[pid];
      const card = document.createElement('div');
      card.className = 'partner-card';
      card.innerHTML = `<span class="p-emoji">${pt.emoji}</span><div class="p-name">${pt.name}</div><div class="p-star">⭐⭐⭐</div>`;
      card.onclick = () => {
        document.getElementById('m-pair').textContent  = t.emoji + ' × ' + pt.emoji;
        document.getElementById('m-title').textContent = t.name + ' × ' + pt.name;
        document.getElementById('m-desc').textContent  = desc;
        document.getElementById('modal').classList.add('open');
      };
      pc.appendChild(card);
    });

    const url = new URL(location.href);
    url.searchParams.set('type', typeId);
    window.history.replaceState(null, '', url.toString());

    document.getElementById('q-screen').classList.remove('active');
    document.getElementById('top-screen').classList.remove('active');
    document.getElementById('result-screen').classList.add('active');
    window.scrollTo(0, 0);
  }

  function showTop() {
    const url = new URL(location.href);
    url.searchParams.delete('type');
    window.history.replaceState(null,'',url.toString());
    document.getElementById('result-screen').classList.remove('active');
    document.getElementById('top-screen').classList.add('active');
    window.scrollTo(0, 0);
  }

  function closeModal(e) {
    if (!e || e.target.id === 'modal') document.getElementById('modal').classList.remove('open');
  }

  function copyResultURL() {
    navigator.clipboard.writeText(location.href).then(() => {
      const t = document.getElementById('toast');
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    });
  }

  // URLパラメータから直接結果表示
  const params = new URLSearchParams(location.search);
  const typeParam = params.get('type');
  if (typeParam && TYPES[typeParam]) showResult(typeParam);
